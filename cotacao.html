<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Cotação – Riomar Cordas</title>
    <meta name="description"
        content="Revise os produtos adicionados à sua cotação e envie sua solicitação para a Riomar Cordas." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="pages.css" />
    <link rel="stylesheet" href="cotacao.css" />
    <script src="components.js"></script>
    <script src="cotacao.js"></script>
</head>

<body>

    <main class="cotacao-page">
        <div class="container">
            <div class="cotacao-page__header">
                <div class="breadcrumb">
                    <a href="index.html">Home</a><span class="breadcrumb__sep">›</span>
                    <span class="current">Minha Cotação</span>
                </div>
                <h1>Minha Cotação</h1>
                <p>Revise os itens e preencha seus dados para enviar a solicitação.</p>
            </div>

            <div id="cot-page-body"></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCotacaoPage();
        });

        function renderCotacaoPage() {
            const body = document.getElementById('cot-page-body');
            const items = CotacaoCart.getItems();

            if (items.length === 0) {
                body.innerHTML = `
      <div class="cot-empty">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        <h2>Sua cotação está vazia</h2>
        <p>Adicione produtos às cotações nas páginas de produto.</p>
        <a href="produtos.html" class="btn btn--primary">Ver Produtos</a>
      </div>`;
                return;
            }

            const rows = items.map(item => `
    <tr data-id="${item.id}">
      <td class="cot-table__prod">${item.produto}</td>
      <td>${item.bitola}</td>
      <td>${item.cor}</td>
      <td>${item.embalagem}</td>
      <td>
        <div class="cot-item-qty">
          <input type="number" value="${item.qty}" min="1" max="9999"
            data-id="${item.id}"
            onchange="CotacaoCart.updateQty(this.dataset.id, parseInt(this.value)||1); renderCotacaoPage();"
            aria-label="Quantidade"/>
        </div>
      </td>
      <td style="font-size:0.82rem;color:#6b7280;max-width:140px;">${item.obs || '—'}</td>
      <td>
        <button class="cot-remove-btn" onclick="CotacaoCart.removeItem('${item.id}'); renderCotacaoPage();" title="Remover item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </td>
    </tr>
  `).join('');

            body.innerHTML = `
    <div class="cot-table-wrap">
      <table class="cot-table">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Bitola</th>
            <th>Cor</th>
            <th>Embalagem</th>
            <th>Qtd.</th>
            <th>Obs.</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="cot-form-card">
      <h2>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Seus Dados
      </h2>
      <form id="cot-form" novalidate>
        <div class="cot-form-grid">
          <div class="cot-form-field">
            <label for="cot-nome">Nome *</label>
            <input type="text" id="cot-nome" placeholder="Seu nome completo" required/>
          </div>
          <div class="cot-form-field">
            <label for="cot-empresa">Empresa</label>
            <input type="text" id="cot-empresa" placeholder="Nome da empresa"/>
          </div>
          <div class="cot-form-field">
            <label for="cot-email">E-mail *</label>
            <input type="email" id="cot-email" placeholder="seu@email.com" required/>
          </div>
          <div class="cot-form-field">
            <label for="cot-tel">Telefone / WhatsApp *</label>
            <input type="tel" id="cot-tel" placeholder="(XX) XXXXX-XXXX" required/>
          </div>
          <div class="cot-form-field">
            <label for="cot-estado">Estado</label>
            <select id="cot-estado">
              <option value="">Selecione o estado</option>
              <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
              <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
              <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
              <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
              <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
              <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
              <option>SP</option><option>SE</option><option>TO</option>
            </select>
          </div>
          <div class="cot-form-field">
            <label for="cot-cidade">Cidade</label>
            <input type="text" id="cot-cidade" placeholder="Sua cidade"/>
          </div>
          <div class="cot-form-field full">
            <label for="cot-msg">Mensagem adicional</label>
            <textarea id="cot-msg" placeholder="Prazo esperado, condições de pagamento, outros detalhes…"></textarea>
          </div>
        </div>
        <div class="cot-submit-row">
          <button type="submit" class="cot-submit-btn" id="cot-submit">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Enviar Cotação
          </button>
          <button type="button" class="cot-clear-btn" onclick="if(confirm('Limpar toda a cotação?')){CotacaoCart.clear();renderCotacaoPage();}">
            Limpar Cotação
          </button>
        </div>
        <div id="cot-form-feedback" style="margin-top:16px;"></div>
      </form>
    </div>
  `;

            // Bind form submit
            document.getElementById('cot-form').addEventListener('submit', handleSubmit);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const nome = document.getElementById('cot-nome').value.trim();
            const email = document.getElementById('cot-email').value.trim();
            const tel = document.getElementById('cot-tel').value.trim();

            if (!nome || !email || !tel) {
                showFeedback('Preencha os campos obrigatórios: Nome, E-mail e Telefone.', 'error');
                return;
            }

            const btn = document.getElementById('cot-submit');
            btn.disabled = true;
            btn.innerHTML = `<svg class="spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg> Enviando…`;

            const items = CotacaoCart.getItems();

            const payload = {
                nome,
                email,
                tel,
                empresa: document.getElementById('cot-empresa').value.trim(),
                estado: document.getElementById('cot-estado').value,
                cidade: document.getElementById('cot-cidade').value.trim(),
                mensagem: document.getElementById('cot-msg').value.trim(),
                itens: items,
            };

            try {
                const res = await fetch('/api/cotacao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!res.ok) throw new Error('Servidor retornou erro ' + res.status);

                CotacaoCart.clear();
                document.getElementById('cot-page-body').innerHTML = `
      <div class="cot-success">
        <div class="cot-success__icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>Cotação enviada com sucesso!</h2>
        <p>Recebemos sua solicitação e entraremos em contato em até <strong>1 dia útil</strong>.</p>
        <a href="produtos.html" class="btn btn--primary">Ver mais Produtos</a>
      </div>`;
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Enviar Cotação`;
                // Fallback: abre WhatsApp com a cotação
                const waMensagem = montarMensagemWA(payload);
                showFeedback(`
      <strong>Não foi possível enviar pelo sistema.</strong><br>
      Tente pelo WhatsApp:
      <a href="https://wa.me/554133372800?text=${encodeURIComponent(waMensagem)}" target="_blank" style="color:#22c55e;font-weight:700;">
        📲 Enviar pelo WhatsApp
      </a>`, 'error');
            }
        }

        function montarMensagemWA(p) {
            let msg = `*Solicitação de Cotação – Riomar Cordas*\n\n`;
            msg += `*Nome:* ${p.nome}\n*E-mail:* ${p.email}\n*Telefone:* ${p.tel}\n`;
            if (p.empresa) msg += `*Empresa:* ${p.empresa}\n`;
            if (p.estado) msg += `*Estado:* ${p.estado}`;
            if (p.cidade) msg += ` – ${p.cidade}`;
            msg += `\n\n*Itens:*\n`;
            p.itens.forEach((i, n) => {
                msg += `${n + 1}. ${i.produto} | Bitola: ${i.bitola} | Cor: ${i.cor} | Qtd: ${i.qty}`;
                if (i.obs) msg += ` | Obs: ${i.obs}`;
                msg += `\n`;
            });
            if (p.mensagem) msg += `\n*Mensagem:* ${p.mensagem}`;
            return msg;
        }

        function showFeedback(html, type) {
            const el = document.getElementById('cot-form-feedback');
            if (!el) return;
            el.innerHTML = html;
            el.style.cssText = type === 'error'
                ? 'background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;border-radius:10px;padding:14px 16px;font-size:.875rem;'
                : 'background:#dcfce7;color:#15803d;border:1px solid #86efac;border-radius:10px;padding:14px 16px;font-size:.875rem;';
        }
    </script>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }
    </style>

    <script src="app.js"></script>
</body>

</html>
