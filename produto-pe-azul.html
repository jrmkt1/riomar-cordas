<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PE Azul - Subprodutos</title>
    <meta name="description" content="Subprodutos da categoria PE Azul da Riomar Cordas." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap"

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="pages.css" />
    <script src="components.js"></script>

<body>
    <main class="products" style="padding:48px 0 72px;">

            <div class="products__grid" style="grid-template-columns:repeat(3,1fr);">

                    <div class="product-card__img">

                            alt="Torcida PE Azul" loading="lazy" />

                            <a href="produto-torcida-pe-azul.html" class="btn btn--sm">Ver Produto</a>

                    </div>
                    <div class="product-card__body">

                    </div>
                </article>

                <article class="product-card animate-on-scroll">
                    <div class="product-card__img">
                        <img src="https://www.riomarcordas.com.br/wp-content/uploads/2019/08/trancada_pe-600x400.jpg"
                            alt="Trancada PE" loading="lazy" />
                        <div class="product-card__overlay">
                            <a href="produto-trancada-pe.html" class="btn btn--sm">Ver Produto</a>

                    </div>

                <article class="product-card animate-on-scroll">

                            alt="Trancada PE Pesca" loading="lazy" />
                        <div class="product-card__overlay">
                            <a href="produto-trancada-pe-pesca.html" class="btn btn--sm">Ver Produto</a>

                    </div>
                    <div class="product-card__body">
                        <h3>Trancada PE Pesca</h3>
                    </div>
                </article>

                <article class="product-card animate-on-scroll">
                    <div class="product-card__img">
                        <img src="https://www.riomarcordas.com.br/wp-content/uploads/2019/08/tranca_pe_pesca_chata-600x400.jpg"
                            alt="Trancada PE Pesca Chata" loading="lazy" />
                        <div class="product-card__overlay">
                            <a href="produto-trancada-pe-pesca-chata.html" class="btn btn--sm">Ver Produto</a>
